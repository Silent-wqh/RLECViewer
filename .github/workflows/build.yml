name: Build RLECViewer

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2019

    steps:
    - uses: actions/checkout@v3

    - name: Upgrade Project
      run: |
        "C:\Program Files (x86)\Microsoft Visual Studio\2019\Enterprise\Common7\IDE\devenv.com" RLECViewer\RLECViewer.dsw /upgrade
        
    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v1.1

    - name: Build
      run: |
        msbuild RLECViewer\RLECViewer.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v142

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: RLECViewer-Release
        path: RLECViewer\Release\RLECViewer.exe
